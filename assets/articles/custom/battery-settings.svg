<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"><title id="title">스마트폰 배터리 설정 점검</title><desc id="desc">배터리, 화면 밝기, 위치 권한, 백그라운드 실행 점검표</desc><rect width="1200" height="675" fill="#eef6ff"/><rect x="86" y="72" width="1028" height="531" rx="34" fill="#fff" stroke="#c8d7ea" stroke-width="4"/><rect x="150" y="135" width="300" height="405" rx="42" fill="#111827"/><rect x="180" y="180" width="240" height="310" rx="18" fill="#f8fafc"/><rect x="220" y="220" width="160" height="72" rx="16" fill="#dbeafe"/><rect x="246" y="240" width="92" height="32" rx="8" fill="#22c55e"/><text x="520" y="190" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#111827">배터리 점검 순서</text><text x="520" y="270" font-family="Arial, sans-serif" font-size="30" fill="#334155">1. 사용량이 큰 앱 확인</text><text x="520" y="330" font-family="Arial, sans-serif" font-size="30" fill="#334155">2. 화면 밝기와 자동 잠금 조정</text><text x="520" y="390" font-family="Arial, sans-serif" font-size="30" fill="#334155">3. 위치 권한과 백그라운드 실행 점검</text><text x="520" y="470" font-family="Arial, sans-serif" font-size="24" fill="#64748b">삭제보다 먼저 설정 원인을 확인하세요</text></svg>